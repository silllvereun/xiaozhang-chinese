<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

<meta name="description" content="HSK1/2, HSKK초급, 회화, 업무, 금융, 거래소, IT/개발, 암호화폐 단어를 암기하고 중국어 작문을 연습하는 개인용 학습 앱">
<meta property="og:title" content="샤오장의 중국어학습">
<meta property="og:description" content="중국어 단어 암기 + 작문 연습 웹앱">
<meta property="og:type" content="website">

<style>
  :root{
    --bg:#f6f5f2;
    --card:#ffffff;
    --ink:#26241f;
    --sub:#7a776d;
    --accent:#e0603f;
    --accent-ink:#ffffff;
    --line:#e7e3da;
    --good:#3f8f5c;
    --bad:#c94b3f;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",-apple-system,BlinkMacSystemFont,sans-serif;
    line-height:1.5;
  }
  #app{
    max-width:720px;
    margin:0 auto;
    padding:16px 16px 60px;
    min-height:100vh;
  }
  h1,h2,h3{margin:0 0 8px;}
  h1{font-size:18px;}
  .topnav{
    display:flex;
    gap:6px;
    overflow-x:auto;
    margin-bottom:16px;
    padding-bottom:4px;
    border-bottom:1px solid var(--line);
  }
  .tab{
    flex:0 0 auto;
    padding:8px 14px;
    border-radius:999px;
    background:transparent;
    border:1px solid transparent;
    color:var(--sub);
    font-size:14px;
    cursor:pointer;
    white-space:nowrap;
  }
  .tab.active{
    background:var(--accent);
    color:var(--accent-ink);
    font-weight:600;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:14px;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:10px 16px;
    border-radius:10px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    font-size:14px;
    cursor:pointer;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{
    background:var(--accent);
    border-color:var(--accent);
    color:var(--accent-ink);
    font-weight:600;
  }
  .btn-ghost{
    background:transparent;
    border-color:transparent;
    color:var(--sub);
  }
  .btn-danger{
    color:var(--bad);
    border-color:#f0d3ce;
  }
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  input[type=text],input[type=number],textarea,select{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    font-size:15px;
    font-family:inherit;
  }
  textarea{resize:vertical;min-height:72px;}
  label.field{display:block;font-size:13px;color:var(--sub);margin:10px 0 4px;}
  .group-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:8px;
    margin:10px 0;
  }
  .group-chip{
    display:flex;
    align-items:center;
    gap:6px;
    padding:8px 10px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:13px;
    cursor:pointer;
    user-select:none;
  }
  .group-chip.on{
    border-color:var(--accent);
    background:#fdece7;
  }
  .row-between{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .check-row{display:flex;align-items:center;gap:8px;font-size:14px;margin:8px 0;}
  .quiz-progress{color:var(--sub);font-size:13px;margin-bottom:6px;}
  .quiz-meaning{font-size:26px;font-weight:700;margin:18px 0;text-align:center;}
  .quiz-hint{text-align:center;color:var(--sub);font-size:13px;margin-bottom:14px;}
  .feedback{
    margin-top:12px;
    padding:12px;
    border-radius:10px;
    font-size:14px;
  }
  .feedback.correct{background:#e8f5ec;color:var(--good);}
  .feedback.wrong{background:#fbeae7;color:var(--bad);}
  .feedback .answer{font-size:20px;font-weight:700;margin-top:4px;}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;margin:14px 0;}
  .stat-box{background:var(--bg);border-radius:10px;padding:10px;}
  .stat-box .num{font-size:20px;font-weight:700;}
  .stat-box .label{font-size:12px;color:var(--sub);}
  .word-list{display:flex;flex-direction:column;gap:8px;}
  .word-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:10px;
    background:#fff;
  }
  .word-main{flex:1;min-width:0;}
  .word-hanzi{font-size:18px;font-weight:700;}
  .word-pinyin{font-size:13px;color:var(--sub);}
  .word-meaning{font-size:13px;color:var(--sub);}
  .badge{
    display:inline-block;
    font-size:11px;
    padding:2px 8px;
    border-radius:999px;
    background:var(--bg);
    color:var(--sub);
    margin-right:6px;
  }
  .icon-btn{
    background:none;
    border:none;
    cursor:pointer;
    font-size:16px;
    padding:4px;
    color:var(--sub);
  }
  .icon-btn.starred{color:#e0a83f;}
  .notes-tabs{display:flex;gap:8px;margin-bottom:12px;}
  .empty{color:var(--sub);font-size:14px;text-align:center;padding:30px 0;}
  .checklist{list-style:none;padding:0;margin:12px 0;font-size:14px;}
  .checklist li{padding:4px 0;}
  .checklist li.ok{color:var(--good);}
  .checklist li.no{color:var(--bad);}
  small.hint{color:var(--sub);font-size:12px;}
  .top-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .top-bar h1{margin:0;}
  .auth-bar{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--sub);}
  .auth-bar input{width:140px;padding:6px 8px;font-size:13px;}
  .auth-bar .btn{padding:6px 10px;font-size:12px;}
  .fab{
    position:fixed;
    right:max(20px, calc((100vw - 720px) / 2 + 20px));
    bottom:24px;
    width:56px;
    height:56px;
    border-radius:50%;
    background:var(--accent);
    color:#fff;
    border:none;
    font-size:26px;
    line-height:1;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
    cursor:pointer;
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .sheet-backdrop{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    z-index:60;
  }
  .sheet{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    max-width:720px;
    margin:0 auto;
    background:#fff;
    border-radius:16px 16px 0 0;
    max-height:85vh;
    overflow-y:auto;
    z-index:61;
    padding:18px;
    animation:sheetUp 0.22s ease-out;
  }
  @keyframes sheetUp{
    from{ transform:translateY(100%); }
    to{ transform:translateY(0); }
  }
  .tap-hanzi{cursor:pointer;border-bottom:1px dashed var(--sub);}
  .sheet-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .sheet-hanzi{font-size:28px;font-weight:700;}
  .sheet-sub{color:var(--sub);font-size:14px;margin-top:2px;}
  .sheet-meaning{font-size:15px;margin-top:4px;}
  .sheet-etymology{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);color:var(--sub);font-size:13px;}
  .sheet-section-title{margin-top:16px;padding-top:14px;border-top:1px solid var(--line);font-size:13px;font-weight:600;color:var(--sub);margin-bottom:8px;}
  .char-chip{cursor:pointer;}
  .chip-row{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
  .chip-sm{
    padding:5px 10px;
    border-radius:999px;
    border:1px solid var(--line);
    font-size:12px;
    cursor:pointer;
    color:var(--sub);
    background:#fff;
  }
  .chip-sm.on{
    border-color:var(--accent);
    background:#fdece7;
    color:var(--accent);
  }
  .view-toggle{display:flex;gap:6px;margin:8px 0;}
  .search-box{position:relative;margin-top:4px;}
  .search-box input{padding-left:36px;}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--sub);pointer-events:none;}
  .filter-section{margin-top:16px;}
  .filter-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
  .filter-header .field{margin:0;}
  .link-btn{background:none;border:none;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;padding:2px 0;}
  .filter-chip{display:inline-flex;align-items:center;gap:6px;}
  .chip-check{width:13px;height:13px;border-radius:4px;border:1.5px solid var(--line);flex:0 0 auto;position:relative;background:#fff;}
  .filter-chip.on .chip-check{background:var(--accent);border-color:var(--accent);}
  .filter-chip.on .chip-check::after{content:"";position:absolute;left:3px;top:0px;width:4px;height:7px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);}
  .toolbar-row{margin-top:16px;padding-top:14px;border-top:1px solid var(--line);}
  .toolbar-row select{max-width:160px;}
  .backup-row{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;}
  .btn-sm{padding:6px 12px;font-size:12px;}
  .table-scroll{max-height:240px;overflow:auto;border:1px solid var(--line);border-radius:10px;}
  .table-scroll table{border-collapse:collapse;width:100%;font-size:12px;}
  .table-scroll th,.table-scroll td{border-bottom:1px solid var(--line);padding:4px 8px;text-align:left;white-space:nowrap;}
  .table-scroll th{background:var(--bg);position:sticky;top:0;}
  .carousel-card{
    text-align:center;
    padding:28px 18px;
  }
  .carousel-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;}
  .carousel-count{color:var(--sub);font-size:13px;}
</style>
</head>

const GROUP_ORDER = ["HSK1","HSK2","HSKK초급","회화","업무","금융","거래소","IT/개발","암호화폐"];

function buildInitialWords(){
  let n = 0;
  const words = [];
  GROUP_ORDER.forEach(group=>{
    const block = RAW_WORDS[group] || "";
    block.trim().split("\n").forEach(line=>{
      if(!line.trim()) return;
      const parts = line.split("|");
      const hanzi = parts[0] || "";
      const pinyin = parts[1] || "";
      const meaning = parts[2] || "";
      n += 1;
      words.push({
        id: "w" + String(n).padStart(3,"0"),
        categories: [group],
        hanzi: hanzi,
        pinyin: pinyin,
        meaning: meaning,
        note: ""
      });
    });
  });
  return words;
}
const INITIAL_WORDS = buildInitialWords();

async function dbGet(key){
  const raw = localStorage.getItem(key);
  return raw ? JSON.parse(raw) : null;
}
async function dbSet(key, value){
  localStorage.setItem(key, JSON.stringify(value));
}
async function dbDelete(key){
  localStorage.removeItem(key);
}

async function loadWordList(){
  try{
    const { data, error } = await supabaseClient.from("words").select("*").order("id");
    if(error) throw error;
    if(data && data.length){
      WORDS = data.map(r=>({id:r.id, categories: (r.categories && r.categories.length) ? r.categories : ["미분류"], hanzi:r.hanzi, pinyin:r.pinyin, meaning:r.meaning, note:r.note||""}));
      await dbSet("wordListCache", WORDS);
      return;
    }
  } catch(e){
    console.warn("단어 목록을 서버에서 불러오지 못했습니다. 캐시를 사용합니다.", e);
  }
  const cached = await dbGet("wordListCache");
  WORDS = (cached && cached.length) ? cached : INITIAL_WORDS.map(w=>({...w}));
}
async function loadStats(){
  const saved = await dbGet("wordStats");
  wordStats = saved || {};
}

async function addWord(data){
  const id = "w" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const row = {id, categories: data.categories, hanzi: data.hanzi, pinyin: data.pinyin, meaning: data.meaning, note: data.note || ""};
  const { error } = await supabaseClient.from("words").insert(row);
  if(error){ alert("단어 추가 실패: " + error.message); return false; }
  WORDS.push({...row});
  await dbSet("wordListCache", WORDS);
  return true;
}
async function updateWord(id, patch){
  const { error } = await supabaseClient.from("words").update({
    categories: patch.categories, hanzi: patch.hanzi, pinyin: patch.pinyin, meaning: patch.meaning, note: patch.note
  }).eq("id", id);
  if(error){ alert("수정 실패 (로그인이 필요합니다): " + error.message); return false; }
  const w = WORDS.find(x=>x.id===id);
  if(w){
    Object.assign(w, patch);
  }
  await dbSet("wordListCache", WORDS);
  return true;
}
async function deleteWord(id){
  const { error } = await supabaseClient.from("words").delete().eq("id", id);
  if(error){ alert("삭제 실패 (로그인이 필요합니다): " + error.message); return false; }
  WORDS = WORDS.filter(x=>x.id!==id);
  delete wordStats[id];
  await dbSet("wordListCache", WORDS);
  await persistStats();
  return true;
}
async function toggleStar(id){
  const s = wordStats[id] || {wrong:0, correct:0, seen:0, passed:0, lastSeen:null, starred:false};
  s.starred = !s.starred;
  wordStats[id] = s;
  await persistStats();
}
function isStarred(id){
  return !!(wordStats[id] && wordStats[id].starred);
}

  CHARACTERS[hanzi] = {...cur, ...patch, isDraft:false};
  await persistCharacters();
}
function getWordsByCharacter(hanzi){
  return WORDS.filter(w=>[...w.hanzi].includes(hanzi));
}
function getWordCharacters(word){
  return [...word.hanzi].filter(isHanziChar);
}

/* ---------------- Sentences (문장 만들기 자동 저장) ---------------- */
async function loadSentences(){
  SENTENCES = (await dbGet("sentences")) || [];
  SENTENCE_WORDS = (await dbGet("sentenceWords")) || [];
}
async function persistSentences(){
  await dbSet("sentences", SENTENCES);
  await dbSet("sentenceWords", SENTENCE_WORDS);
}
function findWordsInText(text){
  const found = [];
  const usedRanges = [];
  const candidates = WORDS.filter(w=>w.hanzi && w.hanzi.length>=1)
    .slice()
    .sort((a,b)=>b.hanzi.length - a.hanzi.length);
  candidates.forEach(w=>{
    let from = 0;
    let idx;
    while((idx = text.indexOf(w.hanzi, from)) !== -1){
      const overlaps = usedRanges.some(r=>idx < r.end && idx+w.hanzi.length > r.start);
      if(!overlaps){
        found.push(w);
        usedRanges.push({start:idx, end:idx+w.hanzi.length});
      }
      from = idx + w.hanzi.length;
    }
  });
  return found;
}
async function saveSentence(text, targetWord){
  const alreadySaved = SENTENCE_WORDS.some(sw=>sw.wordId===targetWord.id && sw.isTarget &&
    SENTENCES.some(s=>s.id===sw.sentenceId && s.content===text));
  if(alreadySaved) return;
  const matchedWords = findWordsInText(text);
  const wordIds = new Set(matchedWords.map(w=>w.id));
  wordIds.add(targetWord.id);
  const sentence = {
    id: "s" + Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    content: text,
    createdAt: new Date().toISOString()
  };
  SENTENCES.push(sentence);
  wordIds.forEach(wordId=>{
    SENTENCE_WORDS.push({sentenceId: sentence.id, wordId, isTarget: wordId === targetWord.id});
  });
  await persistSentences();
}
function getSentencesByWord(wordId){
  const sentenceIds = SENTENCE_WORDS.filter(sw=>sw.wordId===wordId).map(sw=>({id:sw.sentenceId, isTarget:sw.isTarget}));
  return sentenceIds
    .map(ref=>{
      const s = SENTENCES.find(x=>x.id===ref.id);
      return s ? {...s, isTarget: ref.isTarget} : null;
    })
    .filter(Boolean)
    .sort((a,b)=>new Date(b.createdAt) - new Date(a.createdAt));
}

/* ---------------- Quiz logic helpers ---------------- */
function wrongCountOf(id){ return (wordStats[id] && wordStats[id].wrong) || 0; }
function daysSinceSeen(id){
  const last = wordStats[id] && wordStats[id].lastSeen;
  if(!last) return 999;
  return (Date.now() - new Date(last).getTime()) / 86400000;
}
function weightOf(id){
  return 1 + wrongCountOf(id) * 3 + Math.min(daysSinceSeen(id), 30) / 5;
}
function pool(){
  return WORDS.filter(w=>{
    if(!w.categories.some(c=>state.selectedGroups.has(c))) return false;
    if(state.starredOnly && !isStarred(w.id)) return false;
    if(state.reviewMode && wrongCountOf(w.id) === 0) return false;
    return true;
  });
}
function weightedSample(arr, n){
  const src = arr.slice();
  const picked = [];
  n = Math.min(n, src.length);
  for(let i=0;i<n;i++){
    const weights = src.map(w=>weightOf(w.id));
    const total = weights.reduce((a,b)=>a+b, 0);
    let r = Math.random() * total;
    let idx = 0;
    for(; idx < weights.length; idx++){
      r -= weights[idx];
      if(r <= 0) break;
    }
    if(idx >= src.length) idx = src.length - 1;
    picked.push(src[idx]);
    src.splice(idx, 1);
  }
  return picked;
}
function stripTones(s){
  return s.normalize("NFD").replace(/[̀-ͯ]/g, "");
}
function normalize(s){
  return stripTones(String(s).trim().toLowerCase()).replace(/['’\-\s]/g, "");
}
function isHanziInput(s){
  return /[一-鿿]/.test(s);
}
function checkAnswer(word, input){
  const trimmed = String(input || "").trim();
  if(!trimmed) return false;
  if(isHanziInput(trimmed)) return trimmed === word.hanzi;
  return normalize(trimmed) === normalize(word.pinyin);
}
function recordAnswer(word, outcome){
  const s = wordStats[word.id] || {wrong:0, correct:0, seen:0, passed:0, lastSeen:null};
  s.seen += 1;
  s.lastSeen = new Date().toISOString();
  if(outcome === "correct"){
    s.correct += 1;
    s.wrong = Math.max(0, s.wrong - 1);
  } else if(outcome === "wrong"){
    s.wrong += 1;
  } else if(outcome === "passed"){
    s.passed += 1;
    s.wrong += 1;
  }
  wordStats[word.id] = s;
  persistStats();
}

/* ---------------- Sentence grading (rule-based, no server required) ---------------- */
function gradeSentence(word, text){
  const trimmed = String(text || "").trim();
  const hasWord = trimmed.includes(word.hanzi);
  const hanziCount = (trimmed.match(/[一-鿿]/g) || []).length;
  const longEnough = hanziCount >= 4;
  const endsProperly = /[。！？!?]$/.test(trimmed);
  const noKorean = !/[가-힣]/.test(trimmed);
  const items = [
    {ok: hasWord, label: `목표 단어 "${word.hanzi}" 포함`},
    {ok: longEnough, label: "한자 4자 이상으로 작성"},
    {ok: endsProperly, label: "문장부호(。！？)로 끝맺기"},
    {ok: noKorean, label: "중국어로만 작성(한글 미포함)"}
  ];
  const passCount = items.filter(i=>i.ok).length;
  return {
    pass: passCount === items.length,
    items
  };
}

/* ---------------- Sentence grading (AI, optional — via AI_PROXY_URL) ---------------- */
async function gradeSentenceWithAI(word, text){
  if(!AI_PROXY_URL) return null;
  try{
    const res = await fetch(AI_PROXY_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({hanzi: word.hanzi, pinyin: word.pinyin, meaning: word.meaning, sentence: text})
    });
    if(!res.ok) return null;
    const data = await res.json();
    if(!data.ok) return null;
    return data;
  }catch{
    return null;
  }
}

/* ---------------- TTS ---------------- */
let voicesPromise = null;
function loadVoices(){
  if(voicesPromise) return voicesPromise;
  voicesPromise = new Promise(resolve=>{
    let voices = window.speechSynthesis.getVoices();
    if(voices.length){ resolve(voices); return; }
    const handler = () => {
      window.speechSynthesis.removeEventListener("voiceschanged", handler);
      resolve(window.speechSynthesis.getVoices());
    };
    window.speechSynthesis.addEventListener("voiceschanged", handler);
    setTimeout(()=>{
      window.speechSynthesis.removeEventListener("voiceschanged", handler);
      resolve(window.speechSynthesis.getVoices());
    }, 1000);
  });
  return voicesPromise;
}
let zhVoiceMissingWarned = false;
async function speak(text){
  if(!("speechSynthesis" in window) || !text) return;
  window.speechSynthesis.cancel();
  const voices = await loadVoices();
  const zhVoice = voices.find(v=>/^zh/i.test(v.lang));
  const u = new SpeechSynthesisUtterance(text);
  if(zhVoice){
    u.voice = zhVoice;
    u.lang = zhVoice.lang;
  } else {
    u.lang = "zh-CN";
  }
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
  if(!zhVoice && !zhVoiceMissingWarned){
    zhVoiceMissingWarned = true;
    alert("이 기기에 설치된 중국어 음성이 없어서 발음이 정확하게 재생되지 않을 수 있습니다.\nWindows: 설정 > 시간 및 언어 > 언어 및 지역에서 중국어(简体中文)를 추가하고 음성 팩을 설치해보세요.");
  }
}

function parseImportRows(text){

async function saveImportRowsBatched(rows, onProgress){
  const CHUNK_SIZE = 50;
  const prepared = rows.map((r,i)=>({
    id: r.id || ("w" + Date.now().toString(36) + i.toString(36) + Math.random().toString(36).slice(2,5)),
    categories: r.categories.length ? r.categories : ["미분류"],
    hanzi: r.hanzi,
    pinyin: r.pinyin,
    meaning: r.meaning,
    note: r.note || ""
  }));
  // Same-id rows in one upsert() call make Postgres throw
  // "ON CONFLICT DO UPDATE command cannot affect row a second time" — dedupe first, last wins.
  const byId = new Map();
  prepared.forEach(r=>byId.set(r.id, r));
  const deduped = Array.from(byId.values());
  const duplicateCount = prepared.length - deduped.length;
  for(let i=0; i<deduped.length; i+=CHUNK_SIZE){
    const chunk = deduped.slice(i, i+CHUNK_SIZE);
    const { error } = await supabaseClient.from("words").upsert(chunk, {onConflict:"id"});
    if(error) throw error;
    onProgress(Math.min(i+CHUNK_SIZE, deduped.length), deduped.length);
  }
  return { savedCount: deduped.length, duplicateCount };
}

    if(state.screen === "setup") body = renderSetup();

    else if(state.screen === "result") body = renderResult();
  } else if(state.mode === "sentence"){
    body = renderSentence();
  } else if(state.mode === "notes"){
    body = renderNotes();
  } else if(state.mode === "manage"){
    body = renderManage();
  }
  app.innerHTML = `
    <div class="top-bar">
      <h1>샤오장의 중국어학습</h1>
      ${renderAuthBar()}
    </div>
    ${renderTopNav()}
    ${body}
    ${state.sheet ? renderEntitySheet() : ""}
  `;
  bindGlobalNav();
  bindAuthBar();
  if(state.mode === "quiz" && state.screen === "setup") bindSetup();
  if(state.mode === "quiz" && state.screen === "quiz") bindQuiz();
  if(state.mode === "quiz" && state.screen === "result") bindResult();
  if(state.mode === "sentence") bindSentence();
  if(state.mode === "notes") bindNotes();
  if(state.mode === "manage") bindManage();
  bindTapHanzi();
  if(state.sheet) bindEntitySheet();
}

function renderAuthBar(){
  if(currentUser){
    return `<div class="auth-bar">
      <span>✅ ${h(currentUser.email)}</span>
      <button class="btn btn-ghost" id="signOutBtn">로그아웃</button>
    </div>`;
  }
  return `<div class="auth-bar">
    <input type="text" id="loginEmail" placeholder="이메일로 로그인">
    <button class="btn btn-primary" id="sendMagicLinkBtn">로그인</button>
  </div>`;
}
function bindAuthBar(){
  const signOutBtn = document.getElementById("signOutBtn");
  if(signOutBtn) signOutBtn.addEventListener("click", signOut);
  const sendBtn = document.getElementById("sendMagicLinkBtn");
  const emailInput = document.getElementById("loginEmail");
  if(sendBtn && emailInput){
    sendBtn.addEventListener("click", async ()=>{
      const email = emailInput.value.trim();
      if(!email){ alert("이메일을 입력해주세요."); return; }
      sendBtn.disabled = true;
      sendBtn.textContent = "전송 중...";
      const ok = await sendMagicLink(email);
      if(ok) alert(`${email}로 로그인 링크를 보냈습니다. 메일함을 확인해주세요.`);
      sendBtn.disabled = false;
      sendBtn.textContent = "로그인";
    });
  }
}

function renderTopNav(){
  const tabs = [
    {id:"quiz", label:"단어 시험"},
    {id:"sentence", label:"문장 만들기"},
    {id:"notes", label:"복습 노트"},
    {id:"manage", label:"단어장 관리"}

  return `<div class="topnav">
    ${tabs.map(t=>`<button class="tab ${state.mode===t.id?"active":""}" data-nav="${t.id}">${t.label}</button>`).join("")}
  </div>`;
}
function bindGlobalNav(){
  app.querySelectorAll("[data-nav]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const target = btn.getAttribute("data-nav");
      state.mode = target;
      if(target === "quiz") state.screen = "setup";
      if(target === "sentence") pickSentenceWord();
      render();

/* ---------------- Setup screen ---------------- */
function renderSetup(){
  const count = pool().length;
  return `
  <div class="card">
    <h3>학습 범위 선택</h3>
    <div class="group-grid">
      ${GROUP_ORDER.map(g=>`
        <div class="group-chip ${state.selectedGroups.has(g)?"on":""}" data-group="${h(g)}">
          <span>${h(g)}</span>
        </div>
      `).join("")}
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" id="selectAll">전체 선택</button>
      <button class="btn btn-ghost" id="selectNone">전체 해제</button>
    </div>
    <label class="check-row"><input type="checkbox" id="starredOnly" ${state.starredOnly?"checked":""}> 즐겨찾기한 단어만</label>
    <label class="check-row"><input type="checkbox" id="reviewMode" ${state.reviewMode?"checked":""}> 복습 모드 (틀린 단어만 출제)</label>
    <label class="field">문제 수</label>
    <select id="quizSize">
      ${[10,15,20,30,50].map(n=>`<option value="${n}" ${state.quizSize===n?"selected":""}>${n}문제</option>`).join("")}
      <option value="all" ${state.quizSize==="all"?"selected":""}>전체 (${count}문제)</option>
    </select>
    <div style="margin-top:16px;">
      <button class="btn btn-primary" id="startQuiz" ${count===0?"disabled":""} style="width:100%;">시험 시작하기 (${count}단어 중 출제)</button>
    </div>
    ${count===0 ? `<div class="empty">선택된 범위에 단어가 없습니다. 범위를 조정해주세요.</div>` : ""}
  </div>`;
}
function bindSetup(){
  app.querySelectorAll("[data-group]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const g = el.getAttribute("data-group");
      if(state.selectedGroups.has(g)) state.selectedGroups.delete(g);
      else state.selectedGroups.add(g);
      render();
    });
  });
  const selectAll = document.getElementById("selectAll");
  const selectNone = document.getElementById("selectNone");
  if(selectAll) selectAll.addEventListener("click", ()=>{ state.selectedGroups = new Set(GROUP_ORDER); render(); });
  if(selectNone) selectNone.addEventListener("click", ()=>{ state.selectedGroups = new Set(); render(); });
  const starredOnly = document.getElementById("starredOnly");
  if(starredOnly) starredOnly.addEventListener("change", e=>{ state.starredOnly = e.target.checked; render(); });
  const reviewMode = document.getElementById("reviewMode");
  if(reviewMode) reviewMode.addEventListener("change", e=>{ state.reviewMode = e.target.checked; render(); });
  const quizSize = document.getElementById("quizSize");
  if(quizSize) quizSize.addEventListener("change", e=>{
    const v = e.target.value;
    state.quizSize = v === "all" ? "all" : Number(v);
  });
  const startBtn = document.getElementById("startQuiz");
  if(startBtn) startBtn.addEventListener("click", startQuiz);
}
function startQuiz(){
  const p = pool();
  const n = state.quizSize === "all" ? p.length : state.quizSize;
  state.quizWords = weightedSample(p, n);
  state.quizIndex = 0;
  state.answered = false;
  state.lastCorrect = false;
  state.input = "";
  state.quizResults = [];
  state.screen = "quiz";
  render();
}

/* ---------------- Quiz screen ---------------- */
function currentWord(){
  return state.quizWords[state.quizIndex];
}
function renderQuiz(){
  const word = currentWord();
  if(!word){ state.screen = "result"; return renderResult(); }
  return `
  <div class="card">
    <div class="quiz-progress">${state.quizIndex + 1} / ${state.quizWords.length} · ${h(word.categories.join(", "))}</div>
    <div class="quiz-meaning">${h(word.meaning)}</div>
    <div class="quiz-hint">병음 또는 한자로 입력하세요</div>
    <input type="text" id="answerInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="답 입력..." value="${h(state.input)}" ${state.answered?"disabled":""}>
    ${state.answered ? `
      <div class="feedback ${state.lastCorrect?"correct":"wrong"}">
        ${state.lastCorrect ? "정답입니다!" : "오답입니다"}
        <div class="answer">${renderTappableHanzi(word.hanzi)} (${h(word.pinyin)})</div>
      </div>
    ` : ""}
    <div class="btn-row" style="margin-top:14px;">
      <button class="btn" id="speakBtn">🔊 발음 듣기</button>
      ${!state.answered ? `
        <button class="btn" id="passBtn">패스 (Tab)</button>
        <button class="btn btn-primary" id="checkBtn">확인 (Enter)</button>
      ` : `
        <button class="btn btn-primary" id="nextBtn">다음 (Enter)</button>
      `}
    </div>
  </div>`;
}
function bindQuiz(){
  const word = currentWord();
  if(!word) return;
  const input = document.getElementById("answerInput");
  if(input){
    input.focus();
    input.addEventListener("input", e=>{ state.input = e.target.value; });
    input.addEventListener("keydown", e=>{
      if(e.key === "Enter"){
        e.preventDefault();
        if(!state.answered) submitAnswer();
        else nextQuestion();
      } else if(e.key === "Tab" && !state.answered){
        e.preventDefault();
        passQuestion();
      }
    });
  }
  const speakBtn = document.getElementById("speakBtn");
  if(speakBtn) speakBtn.addEventListener("click", ()=>speak(word.hanzi));
  const checkBtn = document.getElementById("checkBtn");
  if(checkBtn) checkBtn.addEventListener("click", submitAnswer);
  const passBtn = document.getElementById("passBtn");
  if(passBtn) passBtn.addEventListener("click", passQuestion);
  const nextBtn = document.getElementById("nextBtn");
  if(nextBtn) nextBtn.addEventListener("click", nextQuestion);
}
function submitAnswer(){
  const word = currentWord();
  if(!word) return;
  const correct = checkAnswer(word, state.input);
  state.answered = true;
  state.lastCorrect = correct;
  recordAnswer(word, correct ? "correct" : "wrong");
  state.quizResults.push({word, outcome: correct ? "correct" : "wrong"});
  render();
}
function passQuestion(){
  const word = currentWord();
  if(!word) return;
  recordAnswer(word, "passed");
  state.quizResults.push({word, outcome: "passed"});
  advanceQuiz();
}
function nextQuestion(){
  advanceQuiz();
}
function advanceQuiz(){
  state.quizIndex += 1;
  state.answered = false;
  state.lastCorrect = false;
  state.input = "";
  if(state.quizIndex >= state.quizWords.length){
    state.screen = "result";
  }
  render();
}

/* ---------------- Result screen ---------------- */
function renderResult(){
  const results = state.quizResults;
  const correct = results.filter(r=>r.outcome==="correct").length;
  const wrong = results.filter(r=>r.outcome==="wrong").length;
  const passed = results.filter(r=>r.outcome==="passed").length;
  const wrongList = results.filter(r=>r.outcome==="wrong");
  const passedList = results.filter(r=>r.outcome==="passed");
  return `
  <div class="card">
    <h3>시험 결과</h3>
    <div class="stat-grid">
      <div class="stat-box"><div class="num">${correct}</div><div class="label">정답</div></div>
      <div class="stat-box"><div class="num">${wrong}</div><div class="label">오답</div></div>
      <div class="stat-box"><div class="num">${passed}</div><div class="label">패스</div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="retryBtn">다시 시험</button>
      <button class="btn" id="backSetupBtn">설정으로</button>
    </div>
  </div>
  ${wrongList.length ? `
  <div class="card">
    <h3>오답 (${wrongList.length})</h3>
    <div class="word-list">
      ${wrongList.map(r=>renderResultWordItem(r.word)).join("")}
    </div>
  </div>` : ""}
  ${passedList.length ? `
  <div class="card">
    <h3>패스 (${passedList.length})</h3>
    <div class="word-list">
      ${passedList.map(r=>renderResultWordItem(r.word)).join("")}

  </div>` : ""}

}
function renderResultWordItem(word){
  return `
    <div class="word-item">
      <div class="word-main">
        ${renderBadges(word.categories)}
        <div class="word-hanzi">${renderTappableHanzi(word.hanzi)} <span class="word-pinyin">${h(word.pinyin)}</span></div>
        <div class="word-meaning">${h(word.meaning)}</div>
      </div>
      <button class="icon-btn speak-word" data-hanzi="${h(word.hanzi)}">🔊</button>
    </div>`;
}
function bindResult(){
  const retryBtn = document.getElementById("retryBtn");
  if(retryBtn) retryBtn.addEventListener("click", startQuiz);
  const backBtn = document.getElementById("backSetupBtn");
  if(backBtn) backBtn.addEventListener("click", ()=>{ state.screen = "setup"; render(); });
  app.querySelectorAll(".speak-word").forEach(btn=>{
    btn.addEventListener("click", ()=>speak(btn.getAttribute("data-hanzi")));
  });
}

/* ---------------- Notes screen ---------------- */
function renderNotes(){
  const wrongWords = WORDS.filter(w=>wrongCountOf(w.id) > 0)
    .sort((a,b)=>wrongCountOf(b.id) - wrongCountOf(a.id));
  const passedWords = WORDS.filter(w=>(wordStats[w.id] && wordStats[w.id].passed > 0))
    .sort((a,b)=>((wordStats[b.id]&&wordStats[b.id].passed)||0) - ((wordStats[a.id]&&wordStats[a.id].passed)||0));
  const list = state.notesTab === "wrong" ? wrongWords : passedWords;
  return `

    </div>

}
function bindNotes(){
  app.querySelectorAll("[data-notes-tab]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      state.notesTab = btn.getAttribute("data-notes-tab");
      render();
    });

/* ---------------- Manage screen ---------------- */
function getManageList(){
  const q = state.manage.query.trim().toLowerCase();
  let list = WORDS.filter(w=>{
    if(q && !(w.hanzi.toLowerCase().includes(q) || w.pinyin.toLowerCase().includes(q) || w.meaning.toLowerCase().includes(q))) return false;
    if(state.manage.filterCategories.size && !w.categories.some(c=>state.manage.filterCategories.has(c))) return false;
    return true;
  });
  const sortBy = state.manage.sortBy;
  if(sortBy === "hanzi") list = list.slice().sort((a,b)=>a.hanzi.localeCompare(b.hanzi, "zh-Hans-CN"));
  else if(sortBy === "pinyin") list = list.slice().sort((a,b)=>normalize(a.pinyin).localeCompare(normalize(b.pinyin)));
  else if(sortBy === "category") list = list.slice().sort((a,b)=>(a.categories[0]||"").localeCompare(b.categories[0]||"", "ko"));
  return list;
}

  const list = getManageList();

  const searchInput = document.getElementById("searchInput");
  if(searchInput){
    searchInput.addEventListener("input", e=>{
      state.manage.query = e.target.value;
      if(state.manage.viewMode === "carousel"){ render(); return; }
      const q = state.manage.query.trim().toLowerCase();
      const listEl = document.getElementById("manageList");
      if(!listEl) return;
      listEl.querySelectorAll(".word-item").forEach(item=>{
        const text = item.textContent.toLowerCase();
        item.style.display = (!q || text.includes(q)) ? "" : "none";
      });
    });
  }

  app.querySelectorAll(".filter-chip").forEach(chip=>{
    chip.addEventListener("click", ()=>{
      const cat = chip.getAttribute("data-cat");
      if(state.manage.filterCategories.has(cat)) state.manage.filterCategories.delete(cat);
      else state.manage.filterCategories.add(cat);
      state.manage.carouselIndex = 0;
      render();
    });
  });
  const clearCategoryFilter = document.getElementById("clearCategoryFilter");
  if(clearCategoryFilter) clearCategoryFilter.addEventListener("click", ()=>{
    state.manage.filterCategories.clear();
    state.manage.carouselIndex = 0;
    render();
  });

  const sortBySelect = document.getElementById("sortBySelect");
  if(sortBySelect) sortBySelect.addEventListener("change", e=>{
    state.manage.sortBy = e.target.value;
    render();
  });

  const viewList = document.getElementById("viewList");
  if(viewList) viewList.addEventListener("click", ()=>{ state.manage.viewMode = "list"; render(); });
  const viewCarousel = document.getElementById("viewCarousel");
  if(viewCarousel) viewCarousel.addEventListener("click", ()=>{ state.manage.viewMode = "carousel"; state.manage.carouselIndex = 0; render(); });

  const addWordFab = document.getElementById("addWordFab");
  if(addWordFab) addWordFab.addEventListener("click", ()=>{
    state.manage.showAdd = true;
    state.manage.editingId = null;
    state.manage.formCategories = new Set();
    render();
  });

  const exportBtn = document.getElementById("exportBtn");
  if(exportBtn) exportBtn.addEventListener("click", ()=>{
    exportWordsBackup();
  });
  const importBtn = document.getElementById("importBtn");
  if(importBtn) importBtn.addEventListener("click", ()=>{
    state.manage.showImport = true;
    render();
  });

  const importSheetBackdrop = document.getElementById("importSheetBackdrop");
  if(importSheetBackdrop) importSheetBackdrop.addEventListener("click", ()=>{
    state.manage.showImport = false;
    render();
  });
  const importCancelBtn = document.getElementById("importCancelBtn");
  if(importCancelBtn) importCancelBtn.addEventListener("click", ()=>{
    state.manage.showImport = false;
    render();
  });
  const importPasteArea = document.getElementById("importPasteArea");
  const importPreviewWrap = document.getElementById("importPreviewWrap");
  if(importPasteArea && importPreviewWrap){
    importPasteArea.addEventListener("input", ()=>{
      importPreviewWrap.innerHTML = renderImportPreview(parseImportRows(importPasteArea.value));
    });
  }
  const importSaveBtn = document.getElementById("importSaveBtn");
  if(importSaveBtn) importSaveBtn.addEventListener("click", async ()=>{
    if(state.manage.importBusy) return;
    const rows = parseImportRows(importPasteArea ? importPasteArea.value : "");
    if(!rows.length){ alert("붙여넣은 단어가 없습니다."); return; }
    const invalid = rows.some(r=>!r.hanzi || !r.pinyin || !r.meaning);
    if(invalid){ alert("모든 행에 한자, 병음, 뜻이 있어야 합니다."); return; }
    if(!confirm(`단어 ${rows.length}개를 서버 단어장에 저장합니다. 같은 id의 기존 단어는 덮어씁니다(로그인 필요). 계속할까요?`)) return;
    state.manage.importBusy = true;
    const importProgress = document.getElementById("importProgress");
    try{
      const { duplicateCount } = await saveImportRowsBatched(rows, (done, total)=>{
        if(importProgress) importProgress.textContent = `저장 중... ${done}/${total}`;
      });
      await loadWordList();
      state.manage.showImport = false;
      render();
      if(duplicateCount > 0) alert(`같은 id가 중복된 행 ${duplicateCount}개는 마지막 값으로 병합되어 저장되었습니다.`);
    } catch(err){
      alert("가져오기 실패: " + (err.message || "저장 중 오류가 발생했습니다."));
    } finally {
      state.manage.importBusy = false;
    }
  });

  const sheetBackdrop = document.getElementById("sheetBackdrop");
  if(sheetBackdrop) sheetBackdrop.addEventListener("click", ()=>{
    state.manage.showAdd = false;
    state.manage.editingId = null;
    render();
  });

  app.querySelectorAll(".form-cat-chip").forEach(chip=>{
    chip.addEventListener("click", ()=>{
      const cat = chip.getAttribute("data-cat");
      if(state.manage.formCategories.has(cat)){
        state.manage.formCategories.delete(cat);
        chip.classList.remove("on");
      } else {
        state.manage.formCategories.add(cat);
        chip.classList.add("on");
      }
    });
  });

  const saveWordBtn = document.getElementById("saveWordBtn");
  if(saveWordBtn){
    saveWordBtn.addEventListener("click", async ()=>{
      const categories = Array.from(state.manage.formCategories);
      const hanzi = document.getElementById("fHanzi").value.trim();
      const pinyin = document.getElementById("fPinyin").value.trim();
      const meaning = document.getElementById("fMeaning").value.trim();
      const note = document.getElementById("fNote").value.trim();
      if(!categories.length){
        alert("카테고리를 하나 이상 선택해주세요.");
        return;
      }
      if(!hanzi || !pinyin || !meaning){
        alert("한자, 병음, 뜻은 필수입니다.");
        return;
      }
      if(state.manage.editingId){
        const ok = await updateWord(state.manage.editingId, {categories, hanzi, pinyin, meaning, note});
        if(ok) state.manage.editingId = null;
      } else {
        const ok = await addWord({categories, hanzi, pinyin, meaning, note});
        if(ok) state.manage.showAdd = false;
      }
      render();
    });
  }
  const cancelWordBtn = document.getElementById("cancelWordBtn");
  if(cancelWordBtn) cancelWordBtn.addEventListener("click", ()=>{
    state.manage.showAdd = false;
    state.manage.editingId = null;
    render();
  });
  app.querySelectorAll(".speak-word").forEach(btn=>{
    btn.addEventListener("click", ()=>speak(btn.getAttribute("data-hanzi")));
  });
  app.querySelectorAll(".star-toggle").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      await toggleStar(btn.getAttribute("data-id"));
      render();
    });
  });
  app.querySelectorAll(".edit-word").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const id = btn.getAttribute("data-id");
      const w = WORDS.find(x=>x.id===id);
      state.manage.editingId = id;
      state.manage.showAdd = false;
      state.manage.formCategories = new Set(w ? w.categories : []);
      render();
    });
  });
  app.querySelectorAll(".delete-word").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const id = btn.getAttribute("data-id");
      const w = WORDS.find(x=>x.id===id);
      if(!w) return;
      if(!confirm(`"${w.hanzi}" 단어를 삭제할까요?`)) return;
      await deleteWord(id);
      render();
    });
  });

  if(state.manage.viewMode === "carousel"){
    const prevBtn = document.getElementById("carouselPrev");
    const nextBtn = document.getElementById("carouselNext");
    if(prevBtn) prevBtn.addEventListener("click", ()=>{
      state.manage.carouselIndex = Math.max(0, state.manage.carouselIndex - 1);
      render();
    });
    if(nextBtn) nextBtn.addEventListener("click", ()=>{
      state.manage.carouselIndex = Math.min(list.length - 1, state.manage.carouselIndex + 1);
      render();
    });
    const card = app.querySelector(".carousel-card");
    if(card){
      let touchStartX = null;
      card.addEventListener("touchstart", e=>{ touchStartX = e.touches[0].clientX; });
      card.addEventListener("touchend", e=>{
        if(touchStartX === null) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        if(dx > 40) state.manage.carouselIndex = Math.max(0, state.manage.carouselIndex - 1);
        else if(dx < -40) state.manage.carouselIndex = Math.min(list.length - 1, state.manage.carouselIndex + 1);
        else return;
        render();
      });
    }
  }
}

/* ---------------- Sentence practice screen ---------------- */
function pickSentenceWord(){
  const candidates = WORDS.length ? WORDS : INITIAL_WORDS;
  const idx = Math.floor(Math.random() * candidates.length);
  state.sentence.word = candidates[idx];
  state.sentence.text = "";
  state.sentence.result = null;
  state.sentence.aiFeedback = null;
  state.sentence.aiLoading = false;
}
function renderSentence(){
  if(!state.sentence.word) pickSentenceWord();
  const word = state.sentence.word;
  const result = state.sentence.result;
  const ai = state.sentence.aiFeedback;
  return `
  <div class="card">
    <h3>문장 만들기</h3>
    <small class="hint">${AI_PROXY_URL ? "형식(단어 포함, 길이, 문장부호, 중국어 작성)을 먼저 확인한 뒤, 통과하면 AI가 자연스러운 표현인지 첨삭해줍니다." : "서버 없이 동작하는 규칙 기반 채점입니다: 단어 포함 여부, 문장 길이, 문장부호, 중국어 작성 여부를 확인합니다. 문법까지 검사하지는 않습니다."}</small>
    <div class="quiz-meaning" style="margin-top:14px;">${renderTappableHanzi(word.hanzi)} <span class="word-pinyin">(${h(word.pinyin)})</span></div>
    <div class="quiz-hint">${h(word.meaning)} — 이 단어를 사용해 중국어 문장을 만들어보세요</div>
    <textarea id="sentenceInput" placeholder="예: 我今天很高兴。">${h(state.sentence.text)}</textarea>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn" id="speakWordBtn">🔊 단어 발음</button>
      <button class="btn" id="anotherWordBtn">다른 단어</button>
      <button class="btn btn-primary" id="gradeBtn" ${state.sentence.aiLoading ? "disabled" : ""}>${state.sentence.aiLoading ? "채점 중..." : "채점하기"}</button>
    </div>
    ${result ? `
      <div class="feedback ${result.pass ? "correct" : "wrong"}">
        ${result.pass ? "잘 작성했습니다!" : "조금 더 다듬어보세요"}
        <ul class="checklist">
          ${result.items.map(i=>`<li class="${i.ok?"ok":"no"}">${i.ok?"✓":"✗"} ${h(i.label)}</li>`).join("")}
        </ul>
      </div>
      ${result.pass && state.sentence.aiLoading ? `<div class="quiz-hint" style="margin-top:8px;margin-bottom:0;">🤖 AI 첨삭 확인 중...</div>` : ""}
      ${result.pass && ai ? `
        <div class="feedback ${ai.natural ? "correct" : "wrong"}" style="margin-top:8px;">
          🤖 ${ai.natural ? "AI가 자연스러운 문장이라고 판단했습니다." : "AI 첨삭 의견"}
          ${ai.feedback ? `<div style="margin-top:4px;">${h(ai.feedback)}</div>` : ""}
          ${!ai.natural && ai.corrected ? `<div style="margin-top:4px;">추천 문장: ${h(ai.corrected)}</div>` : ""}
        </div>
      ` : ""}
      ${result.pass && !ai && !state.sentence.aiLoading && AI_PROXY_URL ? `<div class="quiz-hint" style="margin-top:8px;margin-bottom:0;">AI 첨삭을 불러오지 못해 형식 검사 결과만 표시합니다.</div>` : ""}
      <div class="btn-row">
        <button class="btn" id="speakSentenceBtn">🔊 내 문장 듣기</button>
      </div>
    ` : ""}
  </div>`;
}
function bindSentence(){
  const word = state.sentence.word;
  const input = document.getElementById("sentenceInput");
  if(input){
    input.addEventListener("input", e=>{ state.sentence.text = e.target.value; });
  }
  const speakWordBtn = document.getElementById("speakWordBtn");
  if(speakWordBtn) speakWordBtn.addEventListener("click", ()=>speak(word.hanzi));
  const anotherWordBtn = document.getElementById("anotherWordBtn");
  if(anotherWordBtn) anotherWordBtn.addEventListener("click", ()=>{ pickSentenceWord(); render(); });
  const gradeBtn = document.getElementById("gradeBtn");
  if(gradeBtn) gradeBtn.addEventListener("click", async ()=>{
    const text = state.sentence.text.trim();
    const result = gradeSentence(word, text);
    state.sentence.result = result;
    state.sentence.aiFeedback = null;
    if(!result.pass){
      render();
      return;
    }
    await saveSentence(text, word);
    if(AI_PROXY_URL){
      state.sentence.aiLoading = true;
      render();
      const ai = await gradeSentenceWithAI(word, text);
      state.sentence.aiFeedback = ai;
      state.sentence.aiLoading = false;
    }
    render();
  });
  const speakSentenceBtn = document.getElementById("speakSentenceBtn");
  if(speakSentenceBtn) speakSentenceBtn.addEventListener("click", ()=>speak(state.sentence.text));
}

/* ---------------- Init ---------------- */
(async function init(){
  await loadWordList();
  await loadStats();
  await loadCharacters();
  await loadSentences();
  await initAuth();
  render();
})();
</script>
</body>
</html>
