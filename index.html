<!DOCTYPE html>
<html lang="ko">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>샤오장의 중국어학습</title>
<meta name="description" content="HSK1/2, HSKK초급, 회화, 업무, 금융, 거래소, IT/개발, 암호화폐 단어를 암기하고 중국어 작문을 연습하는 개인용 학습 앱">
<meta property="og:title" content="샤오장의 중국어학습">

<style>
  :root{
    --bg:#f6f5f2;
    --card:#ffffff;
    --ink:#26241f;
    --sub:#7a776d;
    --accent:#e0603f;
    --accent-ink:#ffffff;
    --line:#e7e3da;
    --good:#3f8f5c;
    --bad:#c94b3f;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",-apple-system,BlinkMacSystemFont,sans-serif;
    line-height:1.5;
  }
  #app{
    max-width:720px;
    margin:0 auto;
    padding:16px 16px 60px;
    min-height:100vh;
  }
  h1,h2,h3{margin:0 0 8px;}
  h1{font-size:20px;}
  .subtitle{color:var(--sub);font-size:13px;margin-bottom:16px;}
  .topnav{
    display:flex;
    gap:6px;
    overflow-x:auto;
    margin-bottom:16px;
    padding-bottom:4px;
    border-bottom:1px solid var(--line);
  }
  .tab{
    flex:0 0 auto;
    padding:8px 14px;
    border-radius:999px;
    background:transparent;
    border:1px solid transparent;
    color:var(--sub);
    font-size:14px;
    cursor:pointer;
    white-space:nowrap;
  }
  .tab.active{
    background:var(--accent);
    color:var(--accent-ink);
    font-weight:600;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:14px;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:10px 16px;
    border-radius:10px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    font-size:14px;
    cursor:pointer;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{
    background:var(--accent);
    border-color:var(--accent);
    color:var(--accent-ink);
    font-weight:600;
  }
  .btn-ghost{
    background:transparent;
    border-color:transparent;
    color:var(--sub);
  }
  .btn-danger{
    color:var(--bad);
    border-color:#f0d3ce;
  }
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  input[type=text],input[type=number],textarea,select{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    font-size:15px;
    font-family:inherit;
  }
  textarea{resize:vertical;min-height:72px;}
  label.field{display:block;font-size:13px;color:var(--sub);margin:10px 0 4px;}
  .group-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:8px;
    margin:10px 0;
  }
  .group-chip{
    display:flex;
    align-items:center;
    gap:6px;
    padding:8px 10px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:13px;
    cursor:pointer;
    user-select:none;
  }
  .group-chip.on{
    border-color:var(--accent);
    background:#fdece7;
  }
  .row-between{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .check-row{display:flex;align-items:center;gap:8px;font-size:14px;margin:8px 0;}
  .quiz-progress{color:var(--sub);font-size:13px;margin-bottom:6px;}
  .quiz-meaning{font-size:26px;font-weight:700;margin:18px 0;text-align:center;}
  .quiz-hint{text-align:center;color:var(--sub);font-size:13px;margin-bottom:14px;}
  .feedback{
    margin-top:12px;
    padding:12px;
    border-radius:10px;
    font-size:14px;
  }
  .feedback.correct{background:#e8f5ec;color:var(--good);}
  .feedback.wrong{background:#fbeae7;color:var(--bad);}
  .feedback .answer{font-size:20px;font-weight:700;margin-top:4px;}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;margin:14px 0;}
  .stat-box{background:var(--bg);border-radius:10px;padding:10px;}
  .stat-box .num{font-size:20px;font-weight:700;}
  .stat-box .label{font-size:12px;color:var(--sub);}
  .word-list{display:flex;flex-direction:column;gap:8px;}
  .word-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:10px;
    background:#fff;
  }
  .word-main{flex:1;min-width:0;}
  .word-hanzi{font-size:18px;font-weight:700;}
  .word-pinyin{font-size:13px;color:var(--sub);}
  .word-meaning{font-size:13px;color:var(--sub);}
  .badge{
    display:inline-block;
    font-size:11px;
    padding:2px 8px;
    border-radius:999px;
    background:var(--bg);
    color:var(--sub);
    margin-right:6px;
  }
  .icon-btn{
    background:none;
    border:none;
    cursor:pointer;
    font-size:16px;
    padding:4px;
    color:var(--sub);
  }
  .icon-btn.starred{color:#e0a83f;}
  .notes-tabs{display:flex;gap:8px;margin-bottom:12px;}
  .empty{color:var(--sub);font-size:14px;text-align:center;padding:30px 0;}
  .checklist{list-style:none;padding:0;margin:12px 0;font-size:14px;}
  .checklist li{padding:4px 0;}
  .checklist li.ok{color:var(--good);}
  .checklist li.no{color:var(--bad);}
  .file-hidden{display:none;}
  a.hidden-link{display:none;}
  small.hint{color:var(--sub);font-size:12px;}
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
</style>
</head>

const GROUP_ORDER = ["HSK1","HSK2","HSKK초급","회화","업무","금융","거래소","IT/개발","암호화폐"];

function buildInitialWords(){
  let n = 0;
  const words = [];
  GROUP_ORDER.forEach(group=>{
    const block = RAW_WORDS[group] || "";
    block.trim().split("\n").forEach(line=>{
      if(!line.trim()) return;
      const parts = line.split("|");
      const hanzi = parts[0] || "";
      const pinyin = parts[1] || "";
      const meaning = parts[2] || "";
      n += 1;
      words.push({
        id: "w" + String(n).padStart(3,"0"),
        category: group,
        group: group,
        hanzi: hanzi,
        pinyin: pinyin,
        meaning: meaning,
        note: "",
        starred: false
      });
    });
  });
  return words;
}
const INITIAL_WORDS = buildInitialWords();

/* ---------------- Storage (localStorage now, Supabase-ready abstraction) ---------------- */
async function dbGet(key){
  const raw = localStorage.getItem(key);
  return raw ? JSON.parse(raw) : null;
}
async function dbSet(key, value){
  localStorage.setItem(key, JSON.stringify(value));
}
async function dbDelete(key){
  localStorage.removeItem(key);
}

let WORDS = [];
let wordStats = {};

let persistWordsTimer = null;
function persistWordList(){
  clearTimeout(persistWordsTimer);
  return new Promise(resolve=>{
    persistWordsTimer = setTimeout(async ()=>{
      await dbSet("wordList", WORDS);
      resolve();
    }, 300);
  });
}
let persistStatsTimer = null;
function persistStats(){
  clearTimeout(persistStatsTimer);
  return new Promise(resolve=>{
    persistStatsTimer = setTimeout(async ()=>{
      await dbSet("wordStats", wordStats);
      resolve();
    }, 300);
  });
}
async function loadWordList(){
  const saved = await dbGet("wordList");
  if(saved && saved.length){
    WORDS = saved;
  } else {
    WORDS = INITIAL_WORDS.map(w=>({...w}));
    await dbSet("wordList", WORDS);
  }
}
async function loadStats(){
  const saved = await dbGet("wordStats");
  wordStats = saved || {};
}

async function addWord(data){
  const id = "w" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  WORDS.push({
    id,
    category: data.category,
    group: data.category,
    hanzi: data.hanzi,
    pinyin: data.pinyin,
    meaning: data.meaning,
    note: data.note || "",
    starred: !!data.starred
  });
  await persistWordList();
}
async function updateWord(id, patch){
  const w = WORDS.find(x=>x.id===id);
  if(!w) return;
  Object.assign(w, patch);
  if(patch.category){ w.group = patch.category; }
  await persistWordList();
}
async function deleteWord(id){
  WORDS = WORDS.filter(x=>x.id!==id);
  delete wordStats[id];
  await persistWordList();
  await persistStats();
}
async function toggleStar(id){
  const w = WORDS.find(x=>x.id===id);
  if(!w) return;
  w.starred = !w.starred;
  await persistWordList();
}

/* ---------------- Quiz logic helpers ---------------- */
function wrongCountOf(id){ return (wordStats[id] && wordStats[id].wrong) || 0; }
function daysSinceSeen(id){
  const last = wordStats[id] && wordStats[id].lastSeen;
  if(!last) return 999;
  return (Date.now() - new Date(last).getTime()) / 86400000;
}
function weightOf(id){
  return 1 + wrongCountOf(id) * 3 + Math.min(daysSinceSeen(id), 30) / 5;
}
function pool(){
  return WORDS.filter(w=>{
    if(!state.selectedGroups.has(w.group)) return false;
    if(state.starredOnly && !w.starred) return false;
    if(state.reviewMode && wrongCountOf(w.id) === 0) return false;
    return true;
  });
}
function weightedSample(arr, n){
  const src = arr.slice();
  const picked = [];
  n = Math.min(n, src.length);
  for(let i=0;i<n;i++){
    const weights = src.map(w=>weightOf(w.id));
    const total = weights.reduce((a,b)=>a+b, 0);
    let r = Math.random() * total;
    let idx = 0;
    for(; idx < weights.length; idx++){
      r -= weights[idx];
      if(r <= 0) break;
    }
    if(idx >= src.length) idx = src.length - 1;
    picked.push(src[idx]);
    src.splice(idx, 1);
  }
  return picked;
}
function stripTones(s){
  return s.normalize("NFD").replace(/[̀-ͯ]/g, "");
}
function normalize(s){
  return stripTones(String(s).trim().toLowerCase()).replace(/['’\-\s]/g, "");
}
function isHanziInput(s){
  return /[一-鿿]/.test(s);
}
function checkAnswer(word, input){
  const trimmed = String(input || "").trim();
  if(!trimmed) return false;
  if(isHanziInput(trimmed)) return trimmed === word.hanzi;
  return normalize(trimmed) === normalize(word.pinyin);
}
function recordAnswer(word, outcome){
  const s = wordStats[word.id] || {wrong:0, correct:0, seen:0, passed:0, lastSeen:null};
  s.seen += 1;
  s.lastSeen = new Date().toISOString();
  if(outcome === "correct"){
    s.correct += 1;
    s.wrong = Math.max(0, s.wrong - 1);
  } else if(outcome === "wrong"){
    s.wrong += 1;
  } else if(outcome === "passed"){
    s.passed += 1;
    s.wrong += 1;
  }
  wordStats[word.id] = s;
  persistStats();
}

/* ---------------- Sentence grading (rule-based, no server required) ---------------- */
function gradeSentence(word, text){
  const trimmed = String(text || "").trim();
  const hasWord = trimmed.includes(word.hanzi);
  const hanziCount = (trimmed.match(/[一-鿿]/g) || []).length;
  const longEnough = hanziCount >= 4;
  const endsProperly = /[。！？!?]$/.test(trimmed);
  const noKorean = !/[가-힣]/.test(trimmed);
  const items = [
    {ok: hasWord, label: `목표 단어 "${word.hanzi}" 포함`},
    {ok: longEnough, label: "한자 4자 이상으로 작성"},
    {ok: endsProperly, label: "문장부호(。！？)로 끝맺기"},
    {ok: noKorean, label: "중국어로만 작성(한글 미포함)"}
  ];
  const passCount = items.filter(i=>i.ok).length;
  return {
    pass: passCount === items.length,
    items
  };
}

/* ---------------- TTS ---------------- */
let voicesPromise = null;
function loadVoices(){
  if(voicesPromise) return voicesPromise;
  voicesPromise = new Promise(resolve=>{
    let voices = window.speechSynthesis.getVoices();
    if(voices.length){ resolve(voices); return; }
    const handler = () => {
      window.speechSynthesis.removeEventListener("voiceschanged", handler);
      resolve(window.speechSynthesis.getVoices());
    };
    window.speechSynthesis.addEventListener("voiceschanged", handler);
    setTimeout(()=>{
      window.speechSynthesis.removeEventListener("voiceschanged", handler);
      resolve(window.speechSynthesis.getVoices());
    }, 1000);
  });
  return voicesPromise;
}
let zhVoiceMissingWarned = false;
async function speak(text){
  if(!("speechSynthesis" in window) || !text) return;
  window.speechSynthesis.cancel();
  const voices = await loadVoices();
  const zhVoice = voices.find(v=>/^zh/i.test(v.lang));
  const u = new SpeechSynthesisUtterance(text);
  if(zhVoice){
    u.voice = zhVoice;
    u.lang = zhVoice.lang;
  } else {
    u.lang = "zh-CN";
  }
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
  if(!zhVoice && !zhVoiceMissingWarned){
    zhVoiceMissingWarned = true;
    alert("이 기기에 설치된 중국어 음성이 없어서 발음이 정확하게 재생되지 않을 수 있습니다.\nWindows: 설정 > 시간 및 언어 > 언어 및 지역에서 중국어(简体中文)를 추가하고 음성 팩을 설치해보세요.");
  }
}

/* ---------------- Misc helpers ---------------- */
function h(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function downloadJSON(filename, obj){
  const blob = new Blob([JSON.stringify(obj, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.className = "hidden-link";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function startQuiz(){
  const p = pool();
  const n = state.quizSize === "all" ? p.length : state.quizSize;
  state.quizWords = weightedSample(p, n);
  state.quizIndex = 0;
  state.answered = false;
  state.lastCorrect = false;
  state.input = "";
  state.quizResults = [];
  state.screen = "quiz";
  render();
}

/* ---------------- Quiz screen ---------------- */
function currentWord(){
  return state.quizWords[state.quizIndex];
}
function renderQuiz(){
  const word = currentWord();
  if(!word){ state.screen = "result"; return renderResult(); }
  return `
  <div class="card">
    <div class="quiz-progress">${state.quizIndex + 1} / ${state.quizWords.length} · ${h(word.group)}</div>
    <div class="quiz-meaning">${h(word.meaning)}</div>

    ${state.answered ? `
      <div class="feedback ${state.lastCorrect?"correct":"wrong"}">
        ${state.lastCorrect ? "정답입니다!" : "오답입니다"}
        <div class="answer">${h(word.hanzi)} (${h(word.pinyin)})</div>

    ` : ""}

      <button class="btn" id="speakBtn">🔊 발음 듣기</button>
      ${!state.answered ? `
        <button class="btn" id="passBtn">패스 (Tab)</button>
        <button class="btn btn-primary" id="checkBtn">확인 (Enter)</button>
      ` : `
        <button class="btn btn-primary" id="nextBtn">다음 (Enter)</button>
      `}
    </div>
  </div>`;
}
function bindQuiz(){
  const word = currentWord();
  if(!word) return;
  const input = document.getElementById("answerInput");
  if(input){
    input.focus();
    input.addEventListener("input", e=>{ state.input = e.target.value; });
    input.addEventListener("keydown", e=>{
      if(e.key === "Enter"){
        e.preventDefault();
        if(!state.answered) submitAnswer();
        else nextQuestion();
      } else if(e.key === "Tab" && !state.answered){
        e.preventDefault();
        passQuestion();
      }
    });
  }
  const speakBtn = document.getElementById("speakBtn");
  if(speakBtn) speakBtn.addEventListener("click", ()=>speak(word.hanzi));
  const checkBtn = document.getElementById("checkBtn");
  if(checkBtn) checkBtn.addEventListener("click", submitAnswer);
  const passBtn = document.getElementById("passBtn");
  if(passBtn) passBtn.addEventListener("click", passQuestion);
  const nextBtn = document.getElementById("nextBtn");
  if(nextBtn) nextBtn.addEventListener("click", nextQuestion);
}
function submitAnswer(){
  const word = currentWord();
  if(!word) return;
  const correct = checkAnswer(word, state.input);
  state.answered = true;
  state.lastCorrect = correct;
  recordAnswer(word, correct ? "correct" : "wrong");
  state.quizResults.push({word, outcome: correct ? "correct" : "wrong"});
  render();
}
function passQuestion(){
  const word = currentWord();
  if(!word) return;
  recordAnswer(word, "passed");
  state.quizResults.push({word, outcome: "passed"});
  advanceQuiz();
}
function nextQuestion(){
  advanceQuiz();
}
function advanceQuiz(){
  state.quizIndex += 1;
  state.answered = false;
  state.lastCorrect = false;
  state.input = "";
  if(state.quizIndex >= state.quizWords.length){
    state.screen = "result";
  }
  render();
}

/* ---------------- Result screen ---------------- */
function renderResult(){
  const results = state.quizResults;
  const correct = results.filter(r=>r.outcome==="correct").length;
  const wrong = results.filter(r=>r.outcome==="wrong").length;
  const passed = results.filter(r=>r.outcome==="passed").length;
  const wrongList = results.filter(r=>r.outcome==="wrong");
  const passedList = results.filter(r=>r.outcome==="passed");
  return `
  <div class="card">
    <h3>시험 결과</h3>
    <div class="stat-grid">
      <div class="stat-box"><div class="num">${correct}</div><div class="label">정답</div></div>
      <div class="stat-box"><div class="num">${wrong}</div><div class="label">오답</div></div>
      <div class="stat-box"><div class="num">${passed}</div><div class="label">패스</div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="retryBtn">다시 시험</button>
      <button class="btn" id="backSetupBtn">설정으로</button>
    </div>
  </div>
  ${wrongList.length ? `
  <div class="card">
    <h3>오답 (${wrongList.length})</h3>
    <div class="word-list">
      ${wrongList.map(r=>renderResultWordItem(r.word)).join("")}
    </div>
  </div>` : ""}
  ${passedList.length ? `
  <div class="card">
    <h3>패스 (${passedList.length})</h3>
    <div class="word-list">
      ${passedList.map(r=>renderResultWordItem(r.word)).join("")}
    </div>
  </div>` : ""}
  `;
}
function renderResultWordItem(word){
  return `
    <div class="word-item">
      <div class="word-main">
        <span class="badge">${h(word.group)}</span>
        <div class="word-hanzi">${h(word.hanzi)} <span class="word-pinyin">${h(word.pinyin)}</span></div>
        <div class="word-meaning">${h(word.meaning)}</div>
      </div>
      <button class="icon-btn speak-word" data-hanzi="${h(word.hanzi)}">🔊</button>
    </div>`;
}
function bindResult(){
  const retryBtn = document.getElementById("retryBtn");
  if(retryBtn) retryBtn.addEventListener("click", startQuiz);
  const backBtn = document.getElementById("backSetupBtn");
  if(backBtn) backBtn.addEventListener("click", ()=>{ state.screen = "setup"; render(); });
  app.querySelectorAll(".speak-word").forEach(btn=>{
    btn.addEventListener("click", ()=>speak(btn.getAttribute("data-hanzi")));
  });
}

/* ---------------- Notes screen ---------------- */
function renderNotes(){
  const wrongWords = WORDS.filter(w=>wrongCountOf(w.id) > 0)
    .sort((a,b)=>wrongCountOf(b.id) - wrongCountOf(a.id));
  const passedWords = WORDS.filter(w=>(wordStats[w.id] && wordStats[w.id].passed > 0))
    .sort((a,b)=>((wordStats[b.id]&&wordStats[b.id].passed)||0) - ((wordStats[a.id]&&wordStats[a.id].passed)||0));
  const list = state.notesTab === "wrong" ? wrongWords : passedWords;
  return `
  <div class="card">
    <div class="notes-tabs">
      <button class="tab ${state.notesTab==="wrong"?"active":""}" data-notes-tab="wrong">오답노트 (${wrongWords.length})</button>
      <button class="tab ${state.notesTab==="passed"?"active":""}" data-notes-tab="passed">패스노트 (${passedWords.length})</button>
    </div>
    <div class="word-list">
      ${list.length ? list.map(w=>renderNoteItem(w)).join("") : `<div class="empty">아직 기록이 없습니다.</div>`}
    </div>
  </div>`;
}
function renderNoteItem(w){
  const s = wordStats[w.id] || {wrong:0, correct:0, passed:0};
  return `
    <div class="word-item">
      <div class="word-main">
        <span class="badge">${h(w.group)}</span>
        <div class="word-hanzi">${h(w.hanzi)} <span class="word-pinyin">${h(w.pinyin)}</span></div>
        <div class="word-meaning">${h(w.meaning)} · 오답 ${s.wrong||0} / 패스 ${s.passed||0}</div>
      </div>
      <div class="btn-row">
        <button class="icon-btn star-toggle ${w.starred?"starred":""}" data-id="${w.id}">${w.starred?"★":"☆"}</button>
        <button class="icon-btn speak-word" data-hanzi="${h(w.hanzi)}">🔊</button>
      </div>
    </div>`;
}
function bindNotes(){
  app.querySelectorAll("[data-notes-tab]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      state.notesTab = btn.getAttribute("data-notes-tab");
      render();
    });
  });
  app.querySelectorAll(".speak-word").forEach(btn=>{
    btn.addEventListener("click", ()=>speak(btn.getAttribute("data-hanzi")));
  });
  app.querySelectorAll(".star-toggle").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      await toggleStar(btn.getAttribute("data-id"));
      render();
    });
  });
}

/* ---------------- Manage screen ---------------- */
function renderManage(){
  const q = state.manage.query.trim().toLowerCase();
  const filtered = WORDS.filter(w=>{
    if(!q) return true;
    return w.hanzi.toLowerCase().includes(q) || w.pinyin.toLowerCase().includes(q) || w.meaning.toLowerCase().includes(q);
  });
  return `
  <div class="card">
    <div class="row-between">
      <h3>단어장 관리</h3>
      <button class="btn btn-primary" id="toggleAdd">${state.manage.showAdd ? "닫기" : "+ 단어 추가"}</button>
    </div>
    <input type="text" id="searchInput" placeholder="한자/병음/뜻 검색" value="${h(state.manage.query)}">
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn" id="exportBtn">백업 내보내기</button>
      <button class="btn" id="importBtn">백업 가져오기</button>
      <input type="file" id="importFile" accept="application/json" class="file-hidden">
    </div>
  </div>
  ${state.manage.showAdd ? renderWordForm(null) : ""}
  ${state.manage.editingId ? renderWordForm(WORDS.find(w=>w.id===state.manage.editingId)) : ""}
  <div class="card">
    <div class="word-list" id="manageList">
      ${filtered.length ? filtered.map(w=>renderManageItem(w)).join("") : `<div class="empty">검색 결과가 없습니다.</div>`}
    </div>
  </div>`;
}
function renderWordForm(word){
  const isEdit = !!word;
  return `
  <div class="card" id="wordForm">
    <h3>${isEdit ? "단어 수정" : "새 단어 추가"}</h3>
    <label class="field">카테고리</label>
    <select id="fCategory">
      ${GROUP_ORDER.map(g=>`<option value="${h(g)}" ${word && word.category===g?"selected":""}>${h(g)}</option>`).join("")}
    </select>
    <label class="field">한자</label>
    <input type="text" id="fHanzi" value="${word ? h(word.hanzi) : ""}">
    <label class="field">병음</label>
    <input type="text" id="fPinyin" value="${word ? h(word.pinyin) : ""}">
    <label class="field">뜻</label>
    <input type="text" id="fMeaning" value="${word ? h(word.meaning) : ""}">
    <label class="field">메모 (선택)</label>
    <input type="text" id="fNote" value="${word ? h(word.note || "") : ""}">
    <label class="check-row"><input type="checkbox" id="fStarred" ${word && word.starred ? "checked" : ""}> 즐겨찾기</label>
    <div class="btn-row" style="margin-top:10px;">
      <button class="btn btn-primary" id="saveWordBtn">저장</button>
      <button class="btn btn-ghost" id="cancelWordBtn">취소</button>
    </div>
  </div>`;
}
function renderManageItem(w){
  return `
    <div class="word-item">
      <div class="word-main">
        <span class="badge">${h(w.group)}</span>
        <div class="word-hanzi">${h(w.hanzi)} <span class="word-pinyin">${h(w.pinyin)}</span></div>
        <div class="word-meaning">${h(w.meaning)}</div>
      </div>
      <div class="btn-row">
        <button class="icon-btn star-toggle ${w.starred?"starred":""}" data-id="${w.id}">${w.starred?"★":"☆"}</button>
        <button class="icon-btn speak-word" data-hanzi="${h(w.hanzi)}">🔊</button>
        <button class="icon-btn edit-word" data-id="${w.id}">✏️</button>
        <button class="icon-btn delete-word" data-id="${w.id}">🗑️</button>
      </div>
    </div>`;
}
function bindManage(){
  const searchInput = document.getElementById("searchInput");
  if(searchInput){
    searchInput.addEventListener("input", e=>{
      state.manage.query = e.target.value;
      const q = state.manage.query.trim().toLowerCase();
      const list = document.getElementById("manageList");
      if(!list) return;
      list.querySelectorAll(".word-item").forEach(item=>{
        const text = item.textContent.toLowerCase();
        item.style.display = (!q || text.includes(q)) ? "" : "none";
      });
    });
  }
  const toggleAdd = document.getElementById("toggleAdd");
  if(toggleAdd) toggleAdd.addEventListener("click", ()=>{
    state.manage.showAdd = !state.manage.showAdd;
    state.manage.editingId = null;
    render();
  });
  const exportBtn = document.getElementById("exportBtn");
  if(exportBtn) exportBtn.addEventListener("click", ()=>{
    downloadJSON(`xiaozhang-chinese-backup-${new Date().toISOString().slice(0,10)}.json`, {
      words: WORDS, stats: wordStats, exportedAt: new Date().toISOString()
    });
  });
  const importBtn = document.getElementById("importBtn");
  const importFile = document.getElementById("importFile");
  if(importBtn && importFile){
    importBtn.addEventListener("click", ()=>importFile.click());
    importFile.addEventListener("change", async e=>{
      const file = e.target.files[0];
      if(!file) return;
      try{
        const text = await file.text();
        const data = JSON.parse(text);
        if(!Array.isArray(data.words)) throw new Error("invalid backup file");
        if(!confirm(`단어 ${data.words.length}개를 가져옵니다. 같은 ID의 단어는 덮어씁니다. 계속할까요?`)) return;
        const byId = new Map(WORDS.map(w=>[w.id, w]));
        data.words.forEach(w=>byId.set(w.id, w));
        WORDS = Array.from(byId.values());
        if(data.stats) Object.assign(wordStats, data.stats);
        await persistWordList();
        await persistStats();
        render();
      } catch(err){
        alert("가져오기 실패: 올바른 백업 파일이 아닙니다.");
      }
      importFile.value = "";
    });
  }
  const saveWordBtn = document.getElementById("saveWordBtn");
  if(saveWordBtn){
    saveWordBtn.addEventListener("click", async ()=>{
      const category = document.getElementById("fCategory").value;
      const hanzi = document.getElementById("fHanzi").value.trim();
      const pinyin = document.getElementById("fPinyin").value.trim();
      const meaning = document.getElementById("fMeaning").value.trim();
      const note = document.getElementById("fNote").value.trim();
      const starred = document.getElementById("fStarred").checked;
      if(!hanzi || !pinyin || !meaning){
        alert("한자, 병음, 뜻은 필수입니다.");
        return;
      }
      if(state.manage.editingId){
        await updateWord(state.manage.editingId, {category, hanzi, pinyin, meaning, note, starred});
        state.manage.editingId = null;
      } else {
        await addWord({category, hanzi, pinyin, meaning, note, starred});
        state.manage.showAdd = false;
      }
      render();
    });
  }
  const cancelWordBtn = document.getElementById("cancelWordBtn");
  if(cancelWordBtn) cancelWordBtn.addEventListener("click", ()=>{
    state.manage.showAdd = false;
    state.manage.editingId = null;
    render();
  });
  app.querySelectorAll(".speak-word").forEach(btn=>{
    btn.addEventListener("click", ()=>speak(btn.getAttribute("data-hanzi")));
  });
  app.querySelectorAll(".star-toggle").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      await toggleStar(btn.getAttribute("data-id"));
      render();
    });
  });
  app.querySelectorAll(".edit-word").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      state.manage.editingId = btn.getAttribute("data-id");
      state.manage.showAdd = false;
      render();
    });
  });
  app.querySelectorAll(".delete-word").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const id = btn.getAttribute("data-id");
      const w = WORDS.find(x=>x.id===id);
      if(!w) return;
      if(!confirm(`"${w.hanzi}" 단어를 삭제할까요?`)) return;
      await deleteWord(id);
      render();
    });
  });
}

/* ---------------- Sentence practice screen ---------------- */
function pickSentenceWord(){
  const candidates = WORDS.length ? WORDS : INITIAL_WORDS;
  const idx = Math.floor(Math.random() * candidates.length);
  state.sentence.word = candidates[idx];
  state.sentence.text = "";
  state.sentence.result = null;
}
function renderSentence(){
  if(!state.sentence.word) pickSentenceWord();
  const word = state.sentence.word;
  const result = state.sentence.result;
  return `
  <div class="card">
    <h3>문장 만들기</h3>
    <small class="hint">서버 없이 동작하는 규칙 기반 채점입니다: 단어 포함 여부, 문장 길이, 문장부호, 중국어 작성 여부를 확인합니다. 문법까지 검사하지는 않습니다.</small>
    <div class="quiz-meaning" style="margin-top:14px;">${h(word.hanzi)} <span class="word-pinyin">(${h(word.pinyin)})</span></div>
    <div class="quiz-hint">${h(word.meaning)} — 이 단어를 사용해 중국어 문장을 만들어보세요</div>
    <textarea id="sentenceInput" placeholder="예: 我今天很高兴。">${h(state.sentence.text)}</textarea>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn" id="speakWordBtn">🔊 단어 발음</button>
      <button class="btn" id="anotherWordBtn">다른 단어</button>
      <button class="btn btn-primary" id="gradeBtn">채점하기</button>
    </div>
    ${result ? `
      <div class="feedback ${result.pass ? "correct" : "wrong"}">
        ${result.pass ? "잘 작성했습니다!" : "조금 더 다듬어보세요"}
        <ul class="checklist">
          ${result.items.map(i=>`<li class="${i.ok?"ok":"no"}">${i.ok?"✓":"✗"} ${h(i.label)}</li>`).join("")}
        </ul>
      </div>
      <div class="btn-row">
        <button class="btn" id="speakSentenceBtn">🔊 내 문장 듣기</button>
      </div>
    ` : ""}
  </div>`;
}
function bindSentence(){
  const word = state.sentence.word;
  const input = document.getElementById("sentenceInput");
  if(input){
    input.addEventListener("input", e=>{ state.sentence.text = e.target.value; });
  }
  const speakWordBtn = document.getElementById("speakWordBtn");
  if(speakWordBtn) speakWordBtn.addEventListener("click", ()=>speak(word.hanzi));
  const anotherWordBtn = document.getElementById("anotherWordBtn");
  if(anotherWordBtn) anotherWordBtn.addEventListener("click", ()=>{ pickSentenceWord(); render(); });
  const gradeBtn = document.getElementById("gradeBtn");
  if(gradeBtn) gradeBtn.addEventListener("click", ()=>{
    state.sentence.result = gradeSentence(word, state.sentence.text);
    render();
  });
  const speakSentenceBtn = document.getElementById("speakSentenceBtn");
  if(speakSentenceBtn) speakSentenceBtn.addEventListener("click", ()=>speak(state.sentence.text));
}

/* ---------------- Init ---------------- */
(async function init(){
  await loadWordList();
  await loadStats();
  render();
})();
</script>
</body>
</html>
